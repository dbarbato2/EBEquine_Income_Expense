<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>EBEquine</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // Encodes the path into a query string so the app can restore it
      var segmentCount = 1; // number of path segments in the homepage subpath (EBEquine_Income_Expense = 1)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
